<!DOCTYPE html>
<html>
<head>
    <title>DotaHub Redirect</title>
    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const steamUrl = urlParams.get('join');
            if (steamUrl && steamUrl.startsWith('steam://')) {
                // Redireciona o navegador para o protocolo da Steam
                window.location.href = steamUrl;
                // Opcional: Avisa o usuário e fecha a aba
                document.body.innerHTML = "<h1>Abrindo o Dota 2...</h1><p>Você pode fechar esta aba.</p>";
                setTimeout(() => { window.close(); }, 5000);
            } else {
                document.body.innerHTML = "<h1>Erro: Link de convite inválido.</h1>";
            }
        };
    </script>
</head>
<body>
    <p>Processando convite para o lobby...</p>
</body>
</html>
